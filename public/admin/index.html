<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Insider Mídia · Painel</title>
  </head>
  <body>
    <script>window.CMS_MANUAL_INIT = true;</script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "Alexandre-Rafael/site-insider",
            branch: "main",
            base_url: "https://insider-khaki.vercel.app",
            auth_endpoint: "api/auth"
          },
          publish_mode: "editorial_workflow",
          media_folder: "public/uploads",
          public_folder: "/uploads",
          locale: "pt",
          site_url: "https://insider-khaki.vercel.app",
          display_url: "https://insider-khaki.vercel.app",
          collections: [
            {
              name: "blog",
              label: "Matérias do Blog",
              label_singular: "Matéria",
              folder: "src/content/blog",
              create: true,
              slug: "{{slug}}",
              extension: "md",
              format: "frontmatter",
              summary: "{{title}} — {{category}}",
              fields: [
                { name: "title", label: "Título", widget: "string" },
                { name: "subtitle", label: "Subtítulo", widget: "string", required: false, hint: "Aparece abaixo do título na página da matéria" },
                { name: "excerpt", label: "Resumo para o Google (SEO)", widget: "text", required: false, hint: "Descrição curta exibida nos resultados de busca. Máx. 160 caracteres." },
                { name: "cover", label: "Imagem de capa", widget: "image" },
                { name: "logo", label: "Logo do cliente (opcional)", widget: "image", required: false, hint: "Aparece acima do título nos cards do blog" },
                {
                  name: "coverPosition", label: "Posição da imagem de capa", widget: "select", required: false,
                  hint: "Ajuste o foco da imagem para não cortar a parte importante",
                  options: [
                    { label: "Centro (padrão)", value: "center" },
                    { label: "Topo", value: "top" },
                    { label: "Base", value: "bottom" },
                    { label: "Esquerda", value: "left" },
                    { label: "Direita", value: "right" },
                    { label: "Topo esquerdo", value: "top left" },
                    { label: "Topo direito", value: "top right" },
                    { label: "Base esquerda", value: "bottom left" },
                    { label: "Base direita", value: "bottom right" }
                  ]
                },
                { name: "category", label: "Categoria", widget: "string", hint: "Ex: Tráfego Pago, Cases de Sucesso, Branding, Marketing Digital..." },
                { name: "author", label: "Autor", widget: "string", default: "Insider Mídia" },
                { name: "date", label: "Data de publicação", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD" },
                { name: "draft", label: "Rascunho (não publicar)", widget: "boolean", default: false },
                {
                  name: "body",
                  label: "Conteúdo da matéria",
                  widget: "markdown",
                  buttons: ["bold", "italic", "code", "link", "heading-two", "heading-three", "quote", "bulleted-list", "numbered-list"],
                  editor_components: ["image", "code-block"]
                }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
